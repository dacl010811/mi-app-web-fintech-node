apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: fintech-prod
  labels:
    app: mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp2  # Para AWS EKS
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: fintech-prod
data:
  init.sql: |
    -- Crear usuario de aplicación
    CREATE USER IF NOT EXISTS 'fintech_user'@'%' IDENTIFIED BY 'fintech_pass';
    GRANT ALL PRIVILEGES ON fintech_db.* TO 'fintech_user'@'%';
    FLUSH PRIVILEGES;
    
    -- Crear tablas
    USE fintech_db;
    
    CREATE TABLE IF NOT EXISTS users (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      email VARCHAR(100) UNIQUE NOT NULL,
      password_hash VARCHAR(255),
      role ENUM('user', 'admin') DEFAULT 'user',
      active BOOLEAN DEFAULT TRUE,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );
    
    CREATE TABLE IF NOT EXISTS transactions (
      id INT AUTO_INCREMENT PRIMARY KEY,
      user_id INT NOT NULL,
      type ENUM('income', 'expense', 'transfer') NOT NULL,
      amount DECIMAL(15,2) NOT NULL,
      description VARCHAR(255),
      status ENUM('pending', 'completed', 'failed') DEFAULT 'pending',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE
    );
    
    CREATE TABLE IF NOT EXISTS products (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      description TEXT,
      price DECIMAL(15,2) NOT NULL,
      stock INT DEFAULT 0,
      category VARCHAR(50),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Insertar datos de prueba
    INSERT INTO users (name, email, role) VALUES 
      ('Admin User', 'admin@fintech.com', 'admin'),
      ('Test User', 'test@fintech.com', 'user');
    
    INSERT INTO products (name, description, price, stock, category) VALUES
      ('Cuenta Premium', 'Cuenta con beneficios exclusivos', 99.99, 100, 'accounts'),
      ('Tarjeta Gold', 'Tarjeta de crédito con cashback', 0.00, 1000, 'cards'),
      ('Seguro de Vida', 'Protección para tu familia', 49.99, 500, 'insurance');
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: fintech-prod
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        # Variables desde ConfigMap
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: fintech-config
              key: MYSQL_DATABASE
        - name: MYSQL_ROOT_HOST
          valueFrom:
            configMapKeyRef:
              name: fintech-config
              key: MYSQL_ROOT_HOST
        - name: MYSQL_CHARACTER_SET_SERVER
          valueFrom:
            configMapKeyRef:
              name: fintech-config
              key: MYSQL_CHARACTER_SET_SERVER
        - name: MYSQL_COLLATION_SERVER
          valueFrom:
            configMapKeyRef:
              name: fintech-config
              key: MYSQL_COLLATION_SERVER
        # Variables desde Secrets
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fintech-secrets
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fintech-secrets
              key: MYSQL_PASSWORD
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -p$MYSQL_ROOT_PASSWORD
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mysql -u root -p$MYSQL_ROOT_PASSWORD -e "SELECT 1"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
      - name: mysql-init
        configMap:
          name: mysql-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: fintech-prod
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
    protocol: TCP
    name: mysql
  type: ClusterIP